<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImpulsaDBA</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/bootstrap-icons/bootstrap-icons.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/accessibility.css" />
    <link rel="stylesheet" href="css/accessibility-bar.css" />
    <script>
        window.impulsaAcc = {
            // Alto Contraste
            setHighContrast: function (enabled) {
                const root = document.documentElement;
                const body = document.body;
                if (enabled) {
                    root.classList.add('high-contrast');
                    if (body) body.classList.add('high-contrast');
                } else {
                    root.classList.remove('high-contrast');
                    if (body) body.classList.remove('high-contrast');
                }
            },
            
            // Tamaño de Fuente - 5 opciones (0-4)
            setFontSize: function (sizeIndex) {
                const fontClasses = ['font-size-0875', 'font-size-1', 'font-size-1125', 'font-size-1325', 'font-size-1525'];
                const root = document.documentElement;
                
                // Remover todas las clases de tamaño
                fontClasses.forEach(className => {
                    root.classList.remove(className);
                });
                
                // Aplicar la clase correspondiente 
                if (sizeIndex >= 0 && sizeIndex < fontClasses.length) {
                    root.classList.add(fontClasses[sizeIndex]);
                }
            },
            
            // Guardar y recuperar tamaño de fuente
            saveFontSize: function (sizeIndex) {
                try {
                    localStorage.setItem('impulsaAcc_fontSize', sizeIndex.toString());
                } catch { }
            },
            
            getFontSize: function (defaultValue) {
                try {
                    const saved = localStorage.getItem('impulsaAcc_fontSize');
                    return saved !== null ? parseInt(saved, 10) : defaultValue;
                } catch {
                    return defaultValue;
                }
            },
            
            // Guardar y recuperar flags booleanos
            saveFlag: function (key, value) {
                try {
                    localStorage.setItem('impulsaAcc_' + key, value ? '1' : '0');
                } catch { }
            },
            
            getFlag: function (key) {
                try {
                    return localStorage.getItem('impulsaAcc_' + key) === '1';
                } catch {
                    return false;
                }
            },
            
            // Compatibilidad con setLargeText (deprecated)
            setLargeText: function (enabled) {
                const root = document.documentElement;
                if (enabled) {
                    root.classList.add('large-text');
                } else {
                    root.classList.remove('large-text');
                }
            }
        };
        
        // Cargar preferencias de accesibilidad inmediatamente al cargar la página
        (function() {
            try {
                // Cargar alto contraste
                if (localStorage.getItem('impulsaAcc_high-contrast') === '1') {
                    window.impulsaAcc.setHighContrast(true);
                }
                
                // Cargar tamaño de fuente
                const savedFontSize = localStorage.getItem('impulsaAcc_fontSize');
                if (savedFontSize !== null) {
                    window.impulsaAcc.setFontSize(parseInt(savedFontSize, 10));
                }
            } catch(e) {
                console.error('Error al cargar preferencias de accesibilidad:', e);
            }
        })();
    </script>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ImpulsaDBA.styles.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet" />
    <!-- QuillJS para editor de texto enriquecido -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png" />
    <meta name="theme-color" content="#03173d" />
    <script src="js/theme.js"></script>
</head>

<body>
    <div id="app">
        <div id="mosaic-loader-root"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled exception has occurred. See browser console for details.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="js/accessibility.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/calendario-dragdrop.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="_content/CurrieTechnologies.Razor.SweetAlert2/sweetAlert2.min.js"></script>
    <script src="js/mosaic-loader.js"></script>
    <!-- QuillJS para editor de texto enriquecido -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        window.setupAyudasDropdown = (element, dotNetRef) => {
            const handleClickOutside = (event) => {
                if (element && !element.contains(event.target)) {
                    dotNetRef.invokeMethodAsync('CloseDropdown');
                }
            };
            
            document.addEventListener('click', handleClickOutside);
            
            // Guardar referencia para poder remover el listener después
            element._clickOutsideHandler = handleClickOutside;
        };
        
        window.removeAyudasDropdown = (element) => {
            if (element && element._clickOutsideHandler) {
                document.removeEventListener('click', element._clickOutsideHandler);
                delete element._clickOutsideHandler;
            }
        };

        // Inicializar instancias de Quill
        window.quillInstances = window.quillInstances || {};

        window.initQuillEditor = (editorId, dotNetRef, initialContent) => {
            try {
                if (typeof Quill === 'undefined') {
                    console.error('QuillJS no está cargado. Verifica que el script esté incluido correctamente.');
                    return;
                }

                const editorElement = document.getElementById(editorId);
                if (!editorElement) {
                    console.error(`No se encontró el elemento con ID: ${editorId}`);
                    return;
                }

                // Limpiar contenido previo del elemento
                editorElement.innerHTML = '';

                // Si ya existe una instancia, destruirla por completo (evita toolbars duplicados al reabrir)
                if (window.quillInstances && window.quillInstances[editorId]) {
                    try {
                        const oldQuill = window.quillInstances[editorId];
                        if (typeof oldQuill.destroy === 'function') {
                            oldQuill.destroy();
                        } else if (oldQuill.root && oldQuill.root.parentNode) {
                            oldQuill.root.parentNode.removeChild(oldQuill.root);
                        }
                    } catch (e) {
                        console.warn('Error al destruir instancia anterior:', e);
                    }
                    delete window.quillInstances[editorId];
                }

                // Crear nueva instancia de Quill con barra de herramientas completa
                const quill = new Quill(`#${editorId}`, {
                    theme: 'snow',
                    modules: {
                        toolbar: [
                            [{ 'header': [1, 2, 3, false] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            [{ 'color': [] }, { 'background': [] }],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            [{ 'align': [] }],
                            [{ 'indent': '-1'}, { 'indent': '+1' }],
                            [{ 'script': 'sub'}, { 'script': 'super' }],
                            ['link', 'image', 'video'],
                            ['code-block', 'blockquote'],
                            ['clean']
                        ]
                    },
                    placeholder: 'Escribe el contenido aquí...'
                });

                // Establecer contenido inicial
                if (initialContent && initialContent.trim() !== '') {
                    quill.root.innerHTML = initialContent;
                }

                // Escuchar cambios
                quill.on('text-change', function() {
                    try {
                        const content = quill.root.innerHTML;
                        if (dotNetRef && dotNetRef.invokeMethodAsync) {
                            dotNetRef.invokeMethodAsync('OnEditorContentChanged', editorId, content)
                                .catch(err => console.error('Error al invocar OnEditorContentChanged:', err));
                        }
                    } catch (error) {
                        console.error('Error en text-change handler:', error);
                    }
                });

                // Guardar instancia
                if (!window.quillInstances) {
                    window.quillInstances = {};
                }
                window.quillInstances[editorId] = quill;
                
                console.log(`Quill editor inicializado exitosamente para: ${editorId}`);
            } catch (error) {
                console.error('Error al inicializar Quill editor:', error);
                console.error('EditorId:', editorId);
            }
        };

        window.getQuillContent = (editorId) => {
            if (window.quillInstances[editorId]) {
                return window.quillInstances[editorId].root.innerHTML;
            }
            return '';
        };

        // Destruir instancia de Quill por ID (evita toolbars duplicados al cerrar/reabrir modal)
        window.destroyQuillEditor = (editorId) => {
            if (!editorId || !window.quillInstances) return;
            const quill = window.quillInstances[editorId];
            if (quill) {
                try {
                    if (typeof quill.destroy === 'function') {
                        quill.destroy();
                    } else if (quill.root && quill.root.parentNode) {
                        quill.root.parentNode.removeChild(quill.root);
                    }
                } catch (e) {
                    console.warn('Error al destruir Quill:', e);
                }
                delete window.quillInstances[editorId];
            }
        };
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
        }
    </script>
</body>

</html>
